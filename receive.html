<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>接收頁面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        textarea, .display-div {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        textarea {
            resize: vertical;
            background: #f9f9f9;
        }
        .display-div {
            background: #f0f8ff;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        button {
            margin: 10px 5px;
            padding: 8px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #1976D2;
        }
        .back-btn {
            background: #757575;
        }
        .back-btn:hover {
            background: #616161;
        }
    </style>
</head>
<body>
    <h2>接收到的內容</h2>
    
    <div class="section">
        <h3>1. Textarea 顯示 (可編輯)</h3>
        <textarea id="textAreaDisplay" readonly></textarea>
        <div>
            <button onclick="enableEdit()">啟用編輯</button>
            <button onclick="saveChanges()">儲存變更</button>
        </div>
    </div>
    
    <div class="section">
        <h3>2. Div 顯示 (純文字)</h3>
        <div id="divDisplay" class="display-div"></div>
    </div>
    
    <div class="stats">
        <p>字元數: <span id="charCount">0</span></p>
        <p>行數: <span id="lineCount">0</span></p>
        <p>更新時間: <span id="updateTime">-</span></p>
    </div>
    
    <div>
        <button onclick="copyText()">複製內容</button>
        <button onclick="clearText()">清除內容</button>
        <button class="back-btn" onclick="goBack()">返回傳送頁</button>
    </div>

    <script>
        // 獲取DOM元素
        const textArea = document.getElementById('textAreaDisplay');
        const divDisplay = document.getElementById('divDisplay');
        const charCount = document.getElementById('charCount');
        const lineCount = document.getElementById('lineCount');
        const updateTime = document.getElementById('updateTime');
        
        let isEditing = false;
        
        // 頁面載入時顯示內容
        window.onload = function() {
            displayText();
        };
        
        // 顯示文字內容
        function displayText() {
            const text = sessionStorage.getItem('transferredText') || '';
            
            // 同時顯示在 textarea 和 div
            textArea.value = text;
            divDisplay.textContent = text;
            
            // 更新統計資訊
            updateStats(text);
            updateTime.textContent = new Date().toLocaleTimeString();
        }
        
        // 更新統計資訊
        function updateStats(text) {
            charCount.textContent = text.length;
            lineCount.textContent = text.split('\n').length;
        }
        
        // 啟用編輯模式
        function enableEdit() {
            if (!isEditing) {
                textArea.readOnly = false;
                textArea.style.background = '#fff';
                textArea.style.borderColor = '#4CAF50';
                isEditing = true;
                alert('已啟用編輯模式');
            }
        }
        
        // 儲存變更
        function saveChanges() {
            if (isEditing) {
                const newText = textArea.value;
                sessionStorage.setItem('transferredText', newText);
                
                // 同步更新到 div
                divDisplay.textContent = newText;
                
                // 更新統計
                updateStats(newText);
                updateTime.textContent = new Date().toLocaleTimeString();
                
                // 恢復唯讀
                textArea.readOnly = true;
                textArea.style.background = '#f9f9f9';
                textArea.style.borderColor = '#ddd';
                isEditing = false;
                
                alert('變更已儲存');
            }
        }
        
        // 複製內容
        function copyText() {
            const text = textArea.value;
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('已複製到剪貼簿');
                }).catch(() => {
                    // 降級方案
                    textArea.select();
                    document.execCommand('copy');
                    alert('已複製到剪貼簿');
                });
            }
        }
        
        // 清除內容
        function clearText() {
            if (confirm('確定要清除內容嗎？')) {
                sessionStorage.removeItem('transferredText');
                displayText();
            }
        }
        
        // 返回傳送頁
        function goBack() {
            window.location.href = 'send.html';
        }
        
        // 監聽 textarea 輸入
        textArea.addEventListener('input', function() {
            if (isEditing) {
                // 即時更新 div 顯示
                divDisplay.textContent = this.value;
                updateStats(this.value);
            }
        });
    </script>
</body>
</html>
