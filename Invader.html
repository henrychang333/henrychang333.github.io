<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太空侵略者</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* Tailwind slate-900 */
            touch-action: none; /* 防止手機瀏覽器滑動重新整理 */
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            image-rendering: pixelated; /* 保持像素風格不模糊 */
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }
        /* 觸控控制面板 */
        #touch-controls {
            display: none;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            justify-content: space-between;
            gap: 20px;
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            #touch-controls {
                display: flex;
            }
            canvas {
                max-height: 70vh;
            }
        }
        .btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            user-select: none;
            cursor: pointer;
        }
        .btn:active {
            background-color: rgba(255, 255, 255, 0.3);
        }
        #btn-shoot {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(239, 68, 68, 0.2); /* Red tint */
            border-color: rgba(239, 68, 68, 0.5);
        }
        #btn-shoot:active {
            background-color: rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- 手機版觸控按鈕 -->
    <div id="touch-controls">
        <div class="flex gap-4">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="btn" id="btn-shoot">◎</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 遊戲常數與設定 ---
    const GAME_WIDTH = 800;
    const GAME_HEIGHT = 600;
    const PIXEL_SIZE = 3; // 放大像素

    // 像素圖案定義 (1 = 畫格子, 0 = 空白)
    const SPRITES = {
        player: [
            "    1    ",
            "   111   ",
            "  11111  ",
            "111111111",
            "111111111"
        ],
        alien1: [ // 頂層外星人 (分數最高)
            "  1   1  ",
            "   1 1   ",
            "  11111  ",
            " 11 1 11 ",
            "111111111",
            "1 11111 1",
            "1 1   1 1",
            "   111   "
        ],
        alien2: [ // 中層外星人
            "   111   ",
            "  11111  ",
            " 11 1 11 ",
            "111111111",
            " 1 111 1 ",
            "  1   1  ",
            " 1     1 "
        ],
        alien3: [ // 底層外星人
            "  11111  ",
            " 1111111 ",
            "11 111 11",
            "111111111",
            "  1   1  ",
            " 11   11 "
        ]
    };

    const COLORS = {
        player: '#00ff00',
        alien1: '#ff00ff',
        alien2: '#00ffff',
        alien3: '#ffff00',
        bullet: '#ffffff',
        enemyBullet: '#ff0000',
        shield: '#00ff00',
        text: '#ffffff',
        particle: '#ffaa00'
    };

    // --- 遊戲狀態管理 ---
    let gameState = 'START'; // START, PLAYING, GAMEOVER, LEVEL_TRANSITION
    let score = 0;
    let highscore = localStorage.getItem('spaceInvader_highscore') || 0;
    let lives = 3;
    let level = 1;
    let keys = {};
    
    // 實體陣列
    let player;
    let aliens = [];
    let bullets = [];
    let enemyBullets = [];
    let shields = [];
    let particles = [];
    let stars = [];

    // 外星人移動控制
    let alienDirection = 1; // 1 = 右, -1 = 左
    let alienSpeed = 1;
    let alienDropDistance = 0;
    let timeSinceLastAlienFire = 0;

    // --- 類別定義 ---

    class Star {
        constructor() {
            this.x = Math.random() * GAME_WIDTH;
            this.y = Math.random() * GAME_HEIGHT;
            this.size = Math.random() * 2;
            this.speed = Math.random() * 0.5 + 0.1;
            this.brightness = Math.random();
        }
        update() {
            this.y += this.speed;
            if (this.y > GAME_HEIGHT) {
                this.y = 0;
                this.x = Math.random() * GAME_WIDTH;
            }
        }
        draw(ctx) {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 5;
            this.vy = (Math.random() - 0.5) * 5;
            this.life = 1.0;
            this.decay = Math.random() * 0.05 + 0.02;
            this.color = color;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.fillRect(this.x, this.y, PIXEL_SIZE, PIXEL_SIZE);
            ctx.globalAlpha = 1.0;
        }
    }

    class Sprite {
        constructor(x, y, pattern, color) {
            this.x = x;
            this.y = y;
            this.pattern = pattern;
            this.color = color;
            this.width = pattern[0].length * PIXEL_SIZE;
            this.height = pattern.length * PIXEL_SIZE;
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            for (let r = 0; r < this.pattern.length; r++) {
                for (let c = 0; c < this.pattern[r].length; c++) {
                    if (this.pattern[r][c] === '1') {
                        ctx.fillRect(this.x + c * PIXEL_SIZE, this.y + r * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
                    }
                }
            }
        }
    }

    class Player extends Sprite {
        constructor() {
            super(GAME_WIDTH / 2 - (SPRITES.player[0].length * PIXEL_SIZE) / 2, GAME_HEIGHT - 50, SPRITES.player, COLORS.player);
            this.speed = 5;
            this.cooldown = 0;
            this.maxCooldown = 20; // 射擊間隔
        }
        update() {
            if (keys['ArrowLeft'] || keys['btn-left']) this.x -= this.speed;
            if (keys['ArrowRight'] || keys['btn-right']) this.x += this.speed;

            // 邊界限制
            if (this.x < 0) this.x = 0;
            if (this.x + this.width > GAME_WIDTH) this.x = GAME_WIDTH - this.width;

            if (this.cooldown > 0) this.cooldown--;

            // 射擊
            if ((keys['Space'] || keys['ArrowUp'] || keys['btn-shoot']) && this.cooldown === 0) {
                bullets.push(new Bullet(this.x + this.width / 2 - PIXEL_SIZE / 2, this.y, -10, COLORS.bullet));
                this.cooldown = this.maxCooldown;
            }
        }
    }

    class Alien extends Sprite {
        constructor(x, y, type, row, col) {
            let pattern, color, points;
            if (type === 1) { pattern = SPRITES.alien1; color = COLORS.alien1; points = 30; }
            else if (type === 2) { pattern = SPRITES.alien2; color = COLORS.alien2; points = 20; }
            else { pattern = SPRITES.alien3; color = COLORS.alien3; points = 10; }
            
            super(x, y, pattern, color);
            this.row = row;
            this.col = col;
            this.points = points;
            this.wobble = 0;
        }
        update() {
            this.x += alienDirection * alienSpeed;
            // 簡單的動畫效果：上下微調
            this.wobble += 0.1;
            this.y += Math.sin(this.wobble) * 0.2;
        }
    }

    class Bullet {
        constructor(x, y, speed, color) {
            this.x = x;
            this.y = y;
            this.speed = speed;
            this.color = color;
            this.width = PIXEL_SIZE;
            this.height = PIXEL_SIZE * 3;
            this.active = true;
        }
        update() {
            this.y += this.speed;
            if (this.y < 0 || this.y > GAME_HEIGHT) {
                this.active = false;
            }
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    class ShieldBlock {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = PIXEL_SIZE * 2;
            this.height = PIXEL_SIZE * 2;
            this.active = true;
        }
        draw(ctx) {
            if (!this.active) return;
            ctx.fillStyle = COLORS.shield;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    // --- 遊戲邏輯函數 ---

    function createStars() {
        stars = [];
        for(let i=0; i<100; i++) {
            stars.push(new Star());
        }
    }

    function createShields() {
        shields = [];
        const shieldCount = 4;
        const shieldWidth = 60;
        const spacing = (GAME_WIDTH - (shieldCount * shieldWidth)) / (shieldCount + 1);
        
        for (let s = 0; s < shieldCount; s++) {
            const offsetX = spacing + s * (shieldWidth + spacing);
            const offsetY = GAME_HEIGHT - 120;
            
            // 建立一個拱形的護盾
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 10; col++) {
                    // 挖空下方中間
                    if (row > 3 && col > 2 && col < 7) continue;
                    // 切掉上角
                    if (row === 0 && (col === 0 || col === 9)) continue;
                    
                    shields.push(new ShieldBlock(offsetX + col * PIXEL_SIZE * 2, offsetY + row * PIXEL_SIZE * 2));
                }
            }
        }
    }

    function createAliens() {
        aliens = [];
        const rows = 5;
        const cols = 11;
        const startX = 100;
        const startY = 80;
        const paddingX = 50;
        const paddingY = 40;

        for (let r = 0; r < rows; r++) {
            let type = 3; // 底層2排
            if (r === 0) type = 1; // 頂層1排
            else if (r === 1 || r === 2) type = 2; // 中層2排

            for (let c = 0; c < cols; c++) {
                aliens.push(new Alien(startX + c * paddingX, startY + r * paddingY, type, r, c));
            }
        }
        
        // 難度隨等級提升
        alienSpeed = 0.5 + (level * 0.2);
        alienDirection = 1;
    }

    function initGame() {
        score = 0;
        lives = 3;
        level = 1;
        player = new Player();
        createStars();
        createShields();
        createAliens();
        bullets = [];
        enemyBullets = [];
        particles = [];
        gameState = 'PLAYING';
    }

    function nextLevel() {
        level++;
        player = new Player();
        createAliens();
        bullets = [];
        enemyBullets = [];
        gameState = 'PLAYING';
    }

    function createExplosion(x, y, color, count = 15) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function checkCollision(rect1, rect2) {
        return (rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y);
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        // 背景星星
        stars.forEach(star => star.update());

        player.update();

        // 外星人移動邏輯
        let hitEdge = false;
        let lowestAlienY = 0;

        aliens.forEach(alien => {
            alien.update();
            if (alien.x <= 0 || alien.x + alien.width >= GAME_WIDTH) {
                hitEdge = true;
            }
            if (alien.y > lowestAlienY) {
                lowestAlienY = alien.y;
            }
        });

        if (hitEdge) {
            alienDirection *= -1;
            aliens.forEach(alien => {
                alien.y += 20; // 向下移動
            });
            // 隨數量減少加快速度
            alienSpeed += 0.05; 
        }

        // 外星人射擊
        timeSinceLastAlienFire++;
        // 隨等級和外星人數量減少增加射擊頻率
        let fireRate = Math.max(30, 100 - level * 10 - (55 - aliens.length)); 
        if (timeSinceLastAlienFire > fireRate && aliens.length > 0) {
            // 隨機選一個底部的外星人射擊
            let colsWithAliens = [...new Set(aliens.map(a => a.col))];
            let randomCol = colsWithAliens[Math.floor(Math.random() * colsWithAliens.length)];
            let alienInCol = aliens.filter(a => a.col === randomCol).reduce((bottomMost, current) => current.y > bottomMost.y ? current : bottomMost);
            
            enemyBullets.push(new Bullet(alienInCol.x + alienInCol.width / 2, alienInCol.y + alienInCol.height, 5, COLORS.enemyBullet));
            timeSinceLastAlienFire = 0;
        }

        // 更新子彈
        bullets.forEach(b => b.update());
        enemyBullets.forEach(b => b.update());

        // 清理飛出畫面的子彈
        bullets = bullets.filter(b => b.active);
        enemyBullets = enemyBullets.filter(b => b.active);

        // 碰撞偵測: 玩家子彈 vs 外星人
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            for (let j = aliens.length - 1; j >= 0; j--) {
                let a = aliens[j];
                if (checkCollision(b, a)) {
                    b.active = false;
                    score += a.points;
                    createExplosion(a.x + a.width/2, a.y + a.height/2, a.color);
                    aliens.splice(j, 1);
                    break;
                }
            }
        }

        // 碰撞偵測: 子彈 vs 護盾
        shields.forEach(shield => {
            if (!shield.active) return;
            
            // 玩家子彈打護盾
            bullets.forEach(b => {
                if (b.active && checkCollision(b, shield)) {
                    b.active = false;
                    shield.active = false;
                    createExplosion(shield.x, shield.y, COLORS.shield, 3);
                }
            });
            
            // 敵方子彈打護盾
            enemyBullets.forEach(b => {
                if (b.active && checkCollision(b, shield)) {
                    b.active = false;
                    shield.active = false;
                    createExplosion(shield.x, shield.y, COLORS.shield, 3);
                }
            });
            
            // 外星人撞護盾
            aliens.forEach(a => {
                if (checkCollision(a, shield)) {
                    shield.active = false;
                }
            });
        });

        // 碰撞偵測: 敵方子彈 vs 玩家
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            let b = enemyBullets[i];
            if (checkCollision(b, player)) {
                b.active = false;
                lives--;
                createExplosion(player.x + player.width/2, player.y + player.height/2, COLORS.player, 30);
                
                if (lives <= 0) {
                    gameState = 'GAMEOVER';
                    if (score > highscore) {
                        highscore = score;
                        localStorage.setItem('spaceInvader_highscore', highscore);
                    }
                } else {
                    // 扣命後重置玩家位置
                    player.x = GAME_WIDTH / 2 - player.width / 2;
                }
            }
        }

        // 檢查外星人是否觸底
        if (lowestAlienY + (8 * PIXEL_SIZE) >= player.y) {
            gameState = 'GAMEOVER';
        }

        // 檢查過關
        if (aliens.length === 0) {
            gameState = 'LEVEL_TRANSITION';
            setTimeout(nextLevel, 2000);
        }

        // 更新粒子
        particles.forEach(p => p.update());
        particles = particles.filter(p => p.life > 0);
    }

    function draw() {
        // 清除畫布
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // 繪製背景星星
        if (stars.length === 0 && gameState !== 'PLAYING') createStars(); // 確保開始畫面有星星
        stars.forEach(star => star.draw(ctx));

        if (gameState === 'START') {
            ctx.fillStyle = COLORS.player;
            ctx.font = '40px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText('太空侵略者', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50);
            ctx.fillStyle = COLORS.text;
            ctx.font = '20px "Courier New"';
            ctx.fillText('按 [空白鍵] 或 [射擊] 開始', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20);
            
            // 顯示分數表
            ctx.fillStyle = COLORS.alien1;
            ctx.fillRect(GAME_WIDTH/2 - 80, GAME_HEIGHT/2 + 80, PIXEL_SIZE*3, PIXEL_SIZE*3);
            ctx.fillStyle = COLORS.text;
            ctx.textAlign = 'left';
            ctx.fillText('= 30 分', GAME_WIDTH/2 - 50, GAME_HEIGHT/2 + 90);

            ctx.fillStyle = COLORS.alien2;
            ctx.fillRect(GAME_WIDTH/2 - 80, GAME_HEIGHT/2 + 120, PIXEL_SIZE*3, PIXEL_SIZE*3);
            ctx.fillStyle = COLORS.text;
            ctx.fillText('= 20 分', GAME_WIDTH/2 - 50, GAME_HEIGHT/2 + 130);

            ctx.fillStyle = COLORS.alien3;
            ctx.fillRect(GAME_WIDTH/2 - 80, GAME_HEIGHT/2 + 160, PIXEL_SIZE*3, PIXEL_SIZE*3);
            ctx.fillStyle = COLORS.text;
            ctx.fillText('= 10 分', GAME_WIDTH/2 - 50, GAME_HEIGHT/2 + 170);

            return;
        }

        // 繪製實體
        if (gameState === 'PLAYING' || gameState === 'LEVEL_TRANSITION') {
            player.draw(ctx);
            aliens.forEach(alien => alien.draw(ctx));
            shields.forEach(shield => shield.draw(ctx));
            bullets.forEach(b => b.draw(ctx));
            enemyBullets.forEach(b => b.draw(ctx));
            particles.forEach(p => p.draw(ctx));
        }

        // UI 繪製
        ctx.fillStyle = COLORS.text;
        ctx.font = '20px "Courier New"';
        ctx.textAlign = 'left';
        ctx.fillText(`分數: ${score}`, 20, 30);
        
        ctx.textAlign = 'right';
        ctx.fillText(`最高分: ${highscore}`, GAME_WIDTH - 20, 30);
        
        // 繪製生命值圖示
        ctx.textAlign = 'left';
        ctx.fillText(`生命: `, 20, 60);
        for (let i = 0; i < lives; i++) {
            // 畫小號的玩家飛船作為生命圖示
            ctx.fillStyle = COLORS.player;
            ctx.fillRect(80 + i * 30, 50, 15, 5);
            ctx.fillRect(85 + i * 30, 45, 5, 5);
        }

        // 狀態文字
        if (gameState === 'GAMEOVER') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            ctx.fillStyle = '#ff0000';
            ctx.font = '50px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText('遊戲結束', GAME_WIDTH / 2, GAME_HEIGHT / 2);
            ctx.fillStyle = COLORS.text;
            ctx.font = '20px "Courier New"';
            ctx.fillText('按 [空白鍵] 或 [射擊] 重新開始', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 50);
        } else if (gameState === 'LEVEL_TRANSITION') {
            ctx.fillStyle = COLORS.player;
            ctx.font = '40px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText(`過關！準備進入第 ${level + 1} 波`, GAME_WIDTH / 2, GAME_HEIGHT / 2);
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // --- 輸入事件監聽 ---

    // 鍵盤
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault(); // 防止滾動網頁
            if (gameState === 'START' || gameState === 'GAMEOVER') {
                initGame();
            } else {
                keys['Space'] = true;
            }
        } else {
            keys[e.code] = true;
        }
    });

    window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
    });

    // 觸控按鈕
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    const btnShoot = document.getElementById('btn-shoot');

    function setupTouchButton(btn, keyName) {
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys[keyName] = true;
            if (keyName === 'btn-shoot' && (gameState === 'START' || gameState === 'GAMEOVER')) {
                initGame();
            }
        }, {passive: false});
        
        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[keyName] = false;
        }, {passive: false});
        
        // 支援滑鼠點擊 UI (方便測試)
        btn.addEventListener('mousedown', () => {
            keys[keyName] = true;
            if (keyName === 'btn-shoot' && (gameState === 'START' || gameState === 'GAMEOVER')) {
                initGame();
            }
        });
        btn.addEventListener('mouseup', () => keys[keyName] = false);
        btn.addEventListener('mouseleave', () => keys[keyName] = false);
    }

    setupTouchButton(btnLeft, 'btn-left');
    setupTouchButton(btnRight, 'btn-right');
    setupTouchButton(btnShoot, 'btn-shoot');

    // --- 啟動遊戲 ---
    createStars(); // 初始背景
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
