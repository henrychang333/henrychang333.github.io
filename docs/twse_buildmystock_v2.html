<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>關注股票外資買賣超觀察</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #697586;
      --line: #d9dee7;
      --blue: #2563a8;
      --red: #c7352f;
      --green: #218249;
      --shadow: 0 10px 30px rgba(31, 41, 51, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.2;
    }
    .subtle { color: var(--muted); font-size: 14px; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
    }
    label { color: var(--muted); font-size: 14px; }
    select {
      min-width: 170px;
      border: 1px solid #b8c0cc;
      border-radius: 6px;
      padding: 9px 34px 9px 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat, .chart-panel, .signals, .rules {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .stat { padding: 14px 16px; min-height: 86px; }
    .stat .label { color: var(--muted); font-size: 13px; }
    .stat .value { margin-top: 8px; font-size: 24px; font-weight: 700; }
    .chart-panel { padding: 20px; }
    .chart-container {
      position: relative;
      width: 100%;
      height: 520px;
    }
    .signals, .rules {
      margin-top: 14px;
      padding: 16px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .num { text-align: right; white-space: nowrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-width: 76px;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .badge.buy { background: var(--green); }
    .badge.sell { background: var(--red); }
    .rules ul { margin: 0; padding-left: 20px; color: var(--muted); line-height: 1.8; }
    @media (max-width: 820px) {
      header { align-items: stretch; flex-direction: column; }
      .toolbar { justify-content: space-between; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart-container { height: 390px; }
      table { font-size: 13px; }
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
    @media (max-width: 520px) {
      main { width: min(100% - 20px, 1180px); padding-top: 18px; }
      .stats { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      select { width: 100%; }
      .chart-container { height: 330px; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>

  <main>
    <header>
      <div>
        <h1>關注股票外資買賣超觀察</h1>
        <div class="subtle">近 6 個月股價、20日均線與外資當日買賣超。資料來源：TWSE。</div>
      </div>
      <div class="toolbar">

    <section class="stats" aria-label="摘要">

    <section class="chart-panel" aria-label="線圖">
      <div class="chart-container">
        <canvas id="stockChart"></canvas>
      </div>
    </section>

    <section class="signals">
      <h2 id="signalTitle">買入 / 賣出時間說明</h2>
      <div id="signalTable"></div>
    </section>

    <section class="rules">
      <h2>判斷規則</h2>
      <ul id="rules"></ul>
    </section>
  </main>

":""},{"date":"2026-05-12","close":5310.0,"ma20":4145.25,"foreignCumNetLot":6131.362,"foreignNetLot":77.741,"signal":""},{"date":"2026-05-13","close":4780.0,"ma20":4224.25,"foreignCumNetLot":5618.852,"foreignNetLot":-512.51,"signal":""},{"date":"2026-05-14","close":4830.0,"ma20":4305.25,"foreignCumNetLot":5794.021,"foreignNetLot":175.169,"signal":""},{"date":"2026-05-15","close":4605.0,"ma20":4361.75,"foreignCumNetLot":6194.86,"foreignNetLot":400.839,"signal":""},{"date":"2026-05-18","close":4590.0,"ma20":4415.5,"foreignCumNetLot":5916.864,"foreignNetLot":-277.996,"signal":""},{"date":"2026-05-19","close":4430.0,"ma20":4455.75,"foreignCumNetLot":5793.2,"foreignNetLot":-123.664,"signal":"SELL"},{"date":"2026-05-20","close":4600.0,"ma20":4486.5,"foreignCumNetLot":5919.265,"foreignNetLot":126.065,"signal":"BUY"},{"date":"2026-05-21","close":4905.0,"ma20":4528.5,"foreignCumNetLot":5792.28,"foreignNetLot":-126.985,"signal":""},{"date":"2026-05-22","close":4895.0,"ma20":4574.25,"foreignCumNetLot":5613.621,"foreignNetLot":-178.659,"signal":""},{"date":"2026-05-25","close":4900.0,"ma20":4608.5,"foreignCumNetLot":5403.496,"foreignNetLot":-210.125,"signal":""},{"date":"2026-05-26","close":4640.0,"ma20":4632.5,"foreignCumNetLot":5111.931,"foreignNetLot":-291.565,"signal":""},{"date":"2026-05-27","close":4500.0,"ma20":4657.5,"foreignCumNetLot":5312.395,"foreignNetLot":200.464,"signal":"SELL"},{"date":"2026-05-28","close":4300.0,"ma20":4672.25,"foreignCumNetLot":5493.931,"foreignNetLot":181.536,"signal":""},{"date":"2026-05-29","close":4415.0,"ma20":4686.25,"foreignCumNetLot":5454.544,"foreignNetLot":-39.387,"signal":""},{"date":"2026-07-01","close":4450.0,"ma20":4696.25,"foreignCumNetLot":5551.027,"foreignNetLot":96.483,"signal":""},{"date":"2026-07-02","close":4895.0,"ma20":4733.5,"foreignCumNetLot":5219.679,"foreignNetLot":-331.348,"signal":"BUY"},{"date":"2026-07-03","close":4650.0,"ma20":4737.75,"foreignCumNetLot":4671.997,"foreignNetLot":-547.682,"signal":"SELL"},{"date":"2026-07-06","close":4215.0,"ma20":4708.75,"foreignCumNetLot":4250.928,"foreignNetLot":-421.069,"signal":""},{"date":"2026-07-07","close":4035.0,"ma20":4666.0,"foreignCumNetLot":4215.938,"foreignNetLot":-34.99,"signal":""},{"date":"2026-07-08","close":4065.0,"ma20":4600.5,"foreignCumNetLot":3871.938,"foreignNetLot":-344.0,"signal":""}],"rules":["買入觀察：外資5日與20日買賣超轉強、累積買賣超上升，且股價站上短中期均線。","賣出觀察：外資5日與20日買賣超轉弱、累積買賣超下降，且股價跌破短中期均線。","訊號採買賣交替列示，避免同一段趨勢中重複列出多個同方向觀察點。"]}}</script>
  <script>
    const STOCKS = JSON.parse(document.getElementById("stock-data").textContent);
    const select = document.getElementById("stockSelect");
    let chartInstance = null;

    const colors = {
      blue: "#2563a8",
      red: "#c7352f",
      green: "#218249",
      gray: "#8b95a1",
      grid: "#e7ebf0",
      text: "#1f2933",
      muted: "#697586"
    };

    const crosshairPlugin = {
      id: 'crosshair',
      afterDatasetsDraw(chart, args, options) {
        if (chart.tooltip?._active?.length) {
          const activePoint = chart.tooltip._active[0];
          const { ctx, chartArea: { top, bottom, left, right } } = chart;
          const x = activePoint.element.x;
          const y = activePoint.element.y;

          ctx.save();
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.strokeStyle = colors.muted;

          // 垂直線
          ctx.beginPath();
          ctx.moveTo(x, top);
          ctx.lineTo(x, bottom);
          ctx.stroke();

          // 水平線
          ctx.beginPath();
          ctx.moveTo(left, y);
          ctx.lineTo(right, y);
          ctx.stroke();
          ctx.restore();
        }
      }
    };

    function formatNumber(value, digits = 2) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      return Number(value).toLocaleString("zh-TW", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function formatPct(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      return `${formatNumber(value, 2)}%`;
    }

    function drawChart(stock) {
      const data = stock.series;
      const labels = data.map(d => d.date);
      
      const closePrices = data.map(d => d.close);
      const ma20Values = data.map(d => d.ma20);
      const foreignNetLot = data.map(d => d.foreignNetLot); // 線圖改用當日買賣超

      const pointStyles = data.map(d => {
        if (d.signal === "BUY") return "triangle";
        if (d.signal === "SELL") return "rectRot";
        return "circle";
      });

      const pointColors = data.map(d => {
        if (d.signal === "BUY") return colors.green;
        if (d.signal === "SELL") return colors.red;
        return colors.blue;
      });

      const pointRadius = data.map(d => d.signal ? 8 : 0);
      const pointHoverRadius = data.map(d => d.signal ? 10 : 4);

      if (chartInstance) {
        chartInstance.destroy();
      }

      const ctx = document.getElementById("stockChart").getContext("2d");
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: '收盤價',
              data: closePrices,
              borderColor: colors.blue,
              backgroundColor: colors.blue,
              borderWidth: 2,
              yAxisID: 'yPrice',
              pointStyle: pointStyles,
              pointBackgroundColor: pointColors,
              pointBorderColor: pointColors,
              radius: pointRadius,
              hoverRadius: pointHoverRadius
            },
            {
              label: '20日均線',
              data: ma20Values,
              borderColor: colors.gray,
              borderWidth: 1.5,
              borderDash: [5, 5],
              pointStyle: 'none',
              pointRadius: 0,
              yAxisID: 'yPrice',
              fill: false
            },
            {
              label: '外資當日買賣超(張)', // 標籤與數據皆改為當日
              data: foreignNetLot,
              borderColor: colors.red,
              backgroundColor: colors.red,
              borderWidth: 1.5,
              yAxisID: 'yFlow',
              pointRadius: 0,
              hoverRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: {
              labels: {
                font: { family: 'Microsoft JhengHei', size: 13 }
              }
            },
            tooltip: {
              backgroundColor: 'rgba(255, 255, 255, 0.95)',
              titleColor: colors.text,
              bodyColor: colors.text,
              borderColor: colors.line,
              borderWidth: 1,
              padding: 12,
              boxPadding: 6,
              titleFont: { family: 'Microsoft JhengHei', size: 14, weight: 'bold' },
              bodyFont: { family: 'Microsoft JhengHei', size: 13 },
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  if (label) label += ': ';
                  if (context.parsed.y !== null) {
                    label += formatNumber(context.parsed.y, context.datasetIndex === 2 ? 0 : 2);
                  }
                  return label;
                },
                footer: function(tooltipItems) {
                  const index = tooltipItems[0].dataIndex;
                  const item = data[index];
                  // 游標移入時，在 Tooltip 底部同樣可以清晰呈現該日的訊號狀態
                  let footerText = "";
                  if (item.signal) {
                    footerText += `提示訊號: ${item.signal === "BUY" ? "【買入觀察】" : "【賣出觀察】"}`;
                  }
                  return footerText;
                }
              },
              footerColor: colors.text,
              footerFont: { family: 'Microsoft JhengHei', size: 13, weight: 'bold' }
            },
            zoom: {
              pan: {
                enabled: true,
                mode: 'x',
              },
              zoom: {
                wheel: {
                  enabled: true,
                },
                pinch: {
                  enabled: true
                },
                mode: 'x',
              }
            }
          },
          scales: {
            x: {
              grid: { color: colors.grid },
              ticks: {
                font: { family: 'Microsoft JhengHei', size: 11 },
                maxRotation: 45,
                minRotation: 0
              }
            },
            yPrice: {
              type: 'linear',
              position: 'left',
              title: {
                display: true,
                text: '股價 (及20日均線)',
                font: { family: 'Microsoft JhengHei', size: 13, weight: 'bold' }
              },
              grid: { color: colors.grid },
              ticks: { font: { family: 'Arial', size: 12 } }
            },
            yFlow: {
              type: 'linear',
              position: 'right',
              title: {
                display: true,
                text: '外資當日買賣超 (張)',
                font: { family: 'Microsoft JhengHei', size: 13, weight: 'bold' }
              },
              grid: { drawOnChartArea: false },
              ticks: { font: { family: 'Arial', size: 12 } }
            }
          }
        },
        plugins: [crosshairPlugin]
      });
    }

    function renderSignals(stock) {
      document.getElementById("signalTitle").textContent =
        `${stock.stockNo} ${stock.stockName} 買入 / 賣出時間說明`;
      const target = document.getElementById("signalTable");
      if (!stock.signals.length) {
        target.innerHTML = "<p class=\"subtle\">本期間沒有符合規則的買入或賣出觀察點。</p>";
        return;
      }
      const rows = stock.signals.map((signal) => `
        <tr>
          <td>${signal.date}</td>
          <td><span class="badge ${signal.signal === "BUY" ? "buy" : "sell"}">${signal.label}</span></td>
          <td class="num">${formatNumber(signal.close, 2)}</td>
          <td class="num">${formatNumber(signal.foreignNet5Lot, 0)}</td>
          <td class="num">${formatNumber(signal.foreignNet20Lot, 0)}</td>
          <td>${signal.reason}</td>
        </tr>
      `).join("");
      target.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>日期</th><th>訊號</th><th class="num">收盤價</th>
              <th class="num">外資5日(張)</th><th class="num">外資20日(張)</th><th>說明</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderRules(stock) {
      document.getElementById("rules").innerHTML = stock.rules.map((rule) => `<li>${rule}</li>`).join("");
    }

    function renderStock(code) {
      const stock = STOCKS[code];
      if (!stock) return;
      document.getElementById("latestClose").textContent = formatNumber(stock.latestClose, 2);
      document.getElementById("priceChange").textContent = formatPct(stock.priceChangePct);
      
      // 最上方的外資區塊改為撈取最新一筆訊號或最後一天的「5日累計買賣超股數」
      // 由於後端傳過來的 signals 帶有 foreignNet5Lot，我們可以直接拿最後一天的 series 資料來用
      const latestSeries = stock.series[stock.series.length - 1];
      // 後端 payload 計算中，我們需要確保前端可以拿到 5 日累積數值。
      // 或者是直接從後端傳過來的最後一個符合訊號點拿，此處從後端 signals 陣列最後一個元素或預設判斷：
      const latest5dVol = stock.signals.length > 0 ? stock.signals[stock.signals.length - 1].foreignNet5Lot : 0;
      
      document.getElementById("foreignCum").textContent = `${formatNumber(latest5dVol, 0)} 張`;
      document.getElementById("correlation").textContent =
        stock.sameDayCorrelation === null ? "-" : formatNumber(stock.sameDayCorrelation, 3);
      drawChart(stock);
      renderSignals(stock);
      renderRules(stock);
    }

    Object.values(STOCKS).forEach((stock) => {
      const option = document.createElement("option");
      option.value = stock.stockNo;
      option.textContent = `${stock.stockNo} ${stock.stockName}`;
      select.appendChild(option);
    });
    select.value = "0050";
    select.addEventListener("change", () => renderStock(select.value));
    renderStock(select.value);
  </script>
</body>
