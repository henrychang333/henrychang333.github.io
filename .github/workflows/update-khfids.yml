name: Update KH FIDS Data

on:
  schedule:
    # 每 5 分鐘觸發一次。
    # 注意：GitHub Actions 的 schedule 建議最小間隔為 5 分鐘，
    # 且系統忙碌時實際觸發時間可能會延遲數分鐘，並非精準即時。
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # 允許在 GitHub 網頁上手動點擊執行，方便測試

permissions:
  contents: write   # 需要寫入權限才能把更新後的資料 commit 回 repo

concurrency:
  group: update-kia-fids
  cancel-in-progress: true   # 避免上一次排程還沒跑完，下一次又觸發造成衝突

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        # 不需要 pip install 任何套件，update_data.py 只用 Python 標準函式庫

      - name: Run update script
        run: python scripts/update_khfids_data.py
        # 執行後會產生：
        #   .cache/khfids/data.js
        #   .cache/khfids/update.log
        # 並自動複製一份 data.js 到 docs/data.js（因為 docs/ 目錄已存在於 repo 中）

      - name: Debug - curl source URLs on failure
        if: failure()
        run: |
          echo "=== dep.php ==="
          curl -i -sS --max-time 15 "https://ccc.kia.gov.tw/fids/json/web/dep.php" || true
          echo ""
          echo "=== airline2.json ==="
          curl -i -sS --max-time 15 "https://www.kia.gov.tw/data/airline2.json" || true
          echo ""
          echo "=== airport2.json ==="
          curl -i -sS --max-time 15 "https://www.kia.gov.tw/data/airport2.json" || true
        continue-on-error: true
        # 只有在上一步失敗時才會執行，把三個來源的完整回應（含 HTTP headers）印到
        # workflow 的 log 裡，方便判斷是被防火牆/WAF 擋下來，還是網站本身暫時性錯誤。

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .cache/khfids/data.js .cache/khfids/update.log docs/data.js
          if git diff --cached --quiet; then
            echo "沒有資料變動，略過 commit"
          else
            git commit -m "chore: update KIA FIDS data [skip ci]"
            git push
          fi
